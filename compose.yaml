x-paper-service: &paper-service
  build:
    context: .
    dockerfile: Dockerfile
    args:
      UID: ${UID:-1000}
      GID: ${GID:-1000}
  working_dir: /workspace
  environment:
    PYTHONUNBUFFERED: "1"
    PYTHONPATH: /workspace
    HOME: /home/paper
    GRB_LICENSE_FILE: /licenses/gurobi.lic
    JUPYTER_TOKEN: ${JUPYTER_TOKEN:-paper-local-token}
    GUROBI_MAX_CONCURRENT_MODELS: ${GUROBI_MAX_CONCURRENT_MODELS:-2}
    NOTEBOOK_PATH: ${NOTEBOOK_PATH:-output/jupyter-notebook/agro-yard-paper-benchmark-and-selection.ipynb}
    NOTEBOOK_EXECUTION_TIMEOUT: ${NOTEBOOK_EXECUTION_TIMEOUT:-1800}
  volumes:
    - .:/workspace:z
    - ${GUROBI_LICENSE_FILE:-./gurobi.lic}:/licenses/gurobi.lic:ro,z

services:
  paper-notebook:
    <<: *paper-service
    ports:
      - "8888:8888"
    command: ["/opt/paper/docker/start_jupyter.sh"]

  paper-check:
    <<: *paper-service
    command: ["/opt/paper/docker/check_gurobi.sh"]

  paper-exec:
    <<: *paper-service
    command: ["/opt/paper/docker/run_headless_notebook.sh"]
